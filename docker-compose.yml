services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: airmemory-postgres
    environment:
      POSTGRES_USER: cognee
      POSTGRES_PASSWORD: cognee
      POSTGRES_DB: cognee_db
    ports:
      - "5432:5432"
    volumes:
      - airmemory-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee -d cognee_db"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  airmemory-postgres:
